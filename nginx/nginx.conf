# nginx/nginx.conf
# Simulates an AWS Application Load Balancer (ALB)
# Routes all HTTP traffic to the upstream app service

upstream app_servers {
    # In docker-compose there is one instance.
    server app:3000;
}

# Redirect all HTTP traffic to HTTPS
server {
    listen 80 default_server;
    server_name wholesaleshop.duckdns.org;

    location / {
        return 301 https://$host$request_uri;
    }

    # Keep a lightweight health check on HTTP so load balancers can test
    location /health {
        proxy_pass         http://app_servers/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}

# HTTPS server
server {
    listen 443 ssl http2 default_server;
    server_name wholesaleshop.duckdns.org;

    # Paths inside the nginx container — mount your host certs into
    # /etc/letsencrypt when running the nginx service via docker-compose.
    ssl_certificate     /etc/letsencrypt/live/wholesaleshop.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wholesaleshop.duckdns.org/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers (minimal, add more as needed)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Health check endpoint
    location /health {
        proxy_pass         http://app_servers/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Proxy all other requests to the app servers
    location / {
        proxy_pass         http://app_servers;
        proxy_http_version 1.1;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Host             $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}
